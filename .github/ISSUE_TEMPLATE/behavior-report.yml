name: Behavior report
description: Report an incorrect trigger, unnecessary question, or unclear answer.
title: "[Behavior]: "
labels: [behavior]
body:
  - type: markdown
    attributes:
      value: |
        Use a synthetic prompt. Do not submit personal, confidential, or credential-bearing content.
  - type: textarea
    id: prompt
    attributes:
      label: Minimal synthetic prompt
      description: Provide the smallest prompt that reproduces the behavior.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Host and version
      placeholder: ChatGPT desktop, Codex CLI, or another host
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed personal data, credentials, private conversations, and confidential information.
          required: true
